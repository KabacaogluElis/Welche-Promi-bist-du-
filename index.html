function showResult(){document.getElementById("game").style.display="none";document.getElementById("result").style.display="block";let sorted=Object.entries(stars).map(([name,s])=>[name,similarity(userTraits,s.traits)]).sort((a,b)=>b[1]-a[1]);let winner=sorted[0][0],s=stars[winner];let topTraits=Object.entries(userTraits).sort((a,b)=>b[1]-a[1]).slice(0,4).map(x=>x[0]).join(", ");let html="<div class='big'>🏆</div><h2>Ergebnis für "+player+"</h2>";html+="<div class='card'><h1>"+s.emoji+" "+winner+"</h1><img class='winner-img' src='"+s.img+"' onerror='this.style.display=\"none\"'>";html+="<p>Du passt zu <b>"+winner+"</b>, weil deine stärksten Eigenschaften <b>"+topTraits+"</b> sind.</p><p>"+winner+" wirkt "+s.desc+". Genau deshalb passt dieser Promi am besten zu deinen Antworten.</p><p><b>Persönlichkeitstyp:</b> "+personalityTitle()+"</p><p><b>Kategorie:</b> "+s.cat+"</p></div>";html+="<h2>📊 Deine Persönlichkeit</h2><div class='card'>";Object.entries(userTraits).forEach(([k,v])=>{let p=Math.min(100,Math.round(v/45*100));html+="<div class='rank'><span>"+k+"</span><div class='meter'><div class='fill' style='width:"+p+"%'></div></div><span class='percent'>"+p+"%</span></div>";});html+="</div><h2>⭐ Top 10 Promi-Matches</h2>";sorted.slice(0,10).forEach((x,index)=>{html+="<div class='rank'><span>"+(index+1)+". "+stars[x[0]].emoji+" "+x[0]+" <span class='small'>("+stars[x[0]].cat+")</span></span><div class='meter'><div class='fill' style='width:"+x[1]+"%'></div></div><span class='percent'>"+x[1]+"%</span></div>";});html+="<h2>🏅 Achievements</h2><div class='card'><span class='badge'>🎬 Hollywood-Fan</span><span class='badge'>🏆 Quiz-Finalist</span><span class='badge'>🧠 Persönlichkeitsanalyse</span><span class='badge'>⭐ Top-Match gefunden</span></div>";html+="<div class='certificate'><h2>🏆 Promi-Zertifikat</h2><p>Dieses Zertifikat bestätigt:</p><h1>"+player+"</h1><p>hat die Promi-Energie von</p><h1>"+s.emoji+" "+winner+"</h1><p>"+personalityTitle()+"</p><p>"+new Date().toLocaleDateString("de-CH")+"</p></div><button onclick='window.print()'>🖨️ Zertifikat drucken / als PDF speichern</button><button onclick='location.reload()'>🔄 Nochmal spielen</button>";document.getElementById("result").innerHTML=html;}
