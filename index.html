let selected=[], i=0, player="", scores={}, chosen=[];

function shuffle(arr){
  let a=[...arr];
  for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startGame(){
 player=document.getElementById("playerName").value.trim() || "Spieler/in";
 const count=parseInt(document.getElementById("mode").value);
 selected=shuffle(allQuestions).slice(0,count);
 scores={};
 chosen=[];
 Object.keys(stars).forEach(s=>scores[s]=0);
 document.getElementById("start").style.display="none";
 document.getElementById("game").style.display="block";
 showQuestion();
}

function showQuestion(){
 let percent=Math.round((i/selected.length)*100);
 document.getElementById("bar").style.width=percent+"%";
 if(i>=selected.length){showResult();return;}
 const item=selected[i];
 document.getElementById("hostText").innerText="🎙️ Moderator: "+player+", jetzt kommt Frage "+(i+1)+" von "+selected.length+"!";
 document.getElementById("category").innerText=item.c;
 document.getElementById("question").innerText=item.q;
 document.getElementById("counter").innerText=(i+1)+" / "+selected.length;
 const div=document.getElementById("answers");
 div.innerHTML="";
 shuffle(item.a).forEach(ans=>{
   const b=document.createElement("button");
   b.className="answer";
   b.textContent=ans[0];
   b.onclick=()=>{scores[ans[1]]=(scores[ans[1]]||0)+1; chosen.push({category:item.c, question:item.q, answer:ans[0], star:ans[1]}); i++;showQuestion();};
   div.appendChild(b);
 });
}

function showResult(){
 document.getElementById("game").style.display="none";
 document.getElementById("result").style.display="block";

async function loadWinnerImage(name){
 const box=document.getElementById("winnerImageBox");
 if(!box) return;
 if(imageOverrides[name]){
   box.innerHTML="<img class='winner-img' src='"+imageOverrides[name]+"' alt='"+name+"'><p class='small'>Bild wird online geladen.</p>";
   return;
 }
 const title=wikiTitles[name] || name.replaceAll(" ","_");
 try{
   const url="https://en.wikipedia.org/api/rest_v1/page/summary/"+encodeURIComponent(title);
   const res=await fetch(url);
   const data=await res.json();
   if(data && data.thumbnail && data.thumbnail.source){
     box.innerHTML="<img class='winner-img' src='"+data.thumbnail.source+"' alt='"+name+"'><p class='small'>Bild wird online geladen.</p>";
   }else{
     box.innerHTML="<p class='small'>Kein Online-Bild gefunden.</p>";
   }
 }catch(e){
   box.innerHTML="<p class='small'>Bild konnte nicht geladen werden. Prüfe deine Internetverbindung.</p>";
 }
}
